version: "3.9"

services:
  nginx:
    image: nginx:stable
    container_name: emoforge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - /home/ec2-user/emoforge/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - llm
    networks:
      - emoforge-net

  backend:
    image: dorff2026/emoforge-backend:prod
    container_name: emoforge-backend
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx384m"
    volumes:
      - /home/ec2-user/emoforge-mono/uploads:/home/ec2-user/emoforge-mono/uploads
    networks:
      - emoforge-net

  llm:
    image: dorff2026/emoforge-llm:prod
    container_name: emoforge-llm
    env_file:
      - .env.prod
    networks:
      - emoforge-net

  frontend:
    image: dorff2026/emoforge-frontend:prod
    container_name: emoforge-frontend
    networks:
      - emoforge-net

networks:
  emoforge-net:
    driver: bridge
