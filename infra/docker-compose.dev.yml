version: "3.9"

services:
  nginx:
    image: nginx:stable
    container_name: emoforge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
      - llm
    networks:
      - emoforge-net
 
  backend:
    build:
      context: ../emoforge-integrated-backend
      dockerfile: Dockerfile
    container_name: emoforge-backend
    ports:
      - "18081:8081"
    env_file:
      - .env.dev  
    environment:
    
      RECAPTCHA_ENABLED: "false"

      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_DEV_EMOFORGE_AUTH: DEBUG

      FILE_UPLOAD_PATH_EDITOR_IMAGES_BASE_DIR: /uploads/editor_images/
      FILE_UPLOAD_PATH_EDITOR_IMAGES_PUBLIC_URL: /uploads/images/
      FILE_UPLOAD_PATH_ATTACHMENTS: /uploads/attachment/
      FILE_UPLOAD_PATH_PROFILE_IMAGE_BASE_DIR: /uploads/profile_image/
      FILE_UPLOAD_PATH_PROFILE_IMAGE_PUBLIC_URL: /uploads/profile_image/

      MYBATIS_CONFIGURATION_MAP_UNDERSCORE_TO_CAMEL_CASE: "true"
      MYBATIS_MAPPER_LOCATIONS: classpath:mapper/**/*.xml
      MYBATIS_TYPE_ALIASES_PACKAGE: dev.emoforge.post.dto.bff,dev.emoforge.post.dto.internal

    volumes:
      - C:/devtools/zmylong/EMOFORGE_INTEG/upload:/uploads

    networks:
      - emoforge-net

  llm:
    build:
      context: ../llm_service
      dockerfile: Dockerfile
    container_name: emoforge-llm
    ports:
      - "18000:8000"
    env_file:
      - .env.dev
    networks:
      - emoforge-net

  frontend:
    build:
      context: ../emoforge-integrated-frontend
      dockerfile: Dockerfile
    container_name: emoforge-frontend
    volumes:
    - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "18090:80"
    networks:
      - emoforge-net
    
    

networks:
  emoforge-net:
    driver: bridge
