name: Deploy Emoforge

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Spring Boot (bootJar)
        run: |
          cd emoforge-integrated-backend
          chmod +x ./gradlew
          ./gradlew :emoforge-app:bootJar -x test

      - name: Build & Push Backend
        run: |
          docker build -t dorff2026/emoforge-backend:prod ./emoforge-integrated-backend
          docker push dorff2026/emoforge-backend:prod

      - name: Build & Push Frontend
        run: |
          docker build -t dorff2026/emoforge-frontend:prod ./emoforge-integrated-backend
          docker push dorff2026/emoforge-frontend:prod

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/emoforge-mono

            docker pull dorff2026/emoforge-backend:prod
            docker-compose -f docker-compose.prod.yml stop backend
            docker-compose -f docker-compose.prod.yml rm -f backend
            docker-compose -f docker-compose.prod.yml up -d backend

            sleep 20

            docker pull dorff2026/emoforge-frontend:prod
            docker-compose -f docker-compose.prod.yml stop frontend
            docker-compose -f docker-compose.prod.yml rm -f frontend
            docker-compose -f docker-compose.prod.yml up -d frontend

